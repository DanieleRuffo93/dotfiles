"$schema" = 'https://starship.rs/config-schema.json'

format = """
$directory\
$git_branch\
$git_status\
$golang\
$python\
$rust\
$c\
$lua\
$cmake\
$docker_context\
$package\
$cmd_duration\
$line_break\
$character"""

# Directory
[directory]
truncation_length = 3
truncate_to_repo = true

# Git
[git_branch]
format = '\[[$symbol$branch]($style)\]'
symbol = ''

[git_status]
format = '([\[$all_status$ahead_behind\]]($style))'

# Languages
[golang]
format = '\[[$symbol($version)]($style)\]'
symbol = 'go '

[python]
format = '\[[${symbol}(${version})(\($virtualenv\))]($style)\]'
symbol = 'py '

[rust]
format = '\[[$symbol($version)]($style)\]'
symbol = 'rs '

[c]
format = '\[[$symbol($version)]($style)\]'
symbol = 'c '
detect_extensions = ['c', 'h', 'cpp', 'hpp', 'cc', 'cxx']

[lua]
format = '\[[$symbol($version)]($style)\]'
symbol = 'lua '

[cmake]
format = '\[[$symbol($version)]($style)\]'

[docker_context]
format = '\[[$symbol$context]($style)\]'

[package]
format = '\[[$symbol$version]($style)\]'

# Command duration
[cmd_duration]
min_time = 2_000
format = '\[[⏱ $duration]($style)\]'

# Prompt character
[character]
success_symbol = '[❯](green)'
error_symbol = '[❯](red)'
