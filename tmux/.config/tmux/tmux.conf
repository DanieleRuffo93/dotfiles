# Bootstrap TPM - auto install if not present
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm'"

# Prefix
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display 'Config reloaded'

# Windows and panes index from 1
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Auto rename window to current command
set -g automatic-rename on
set -g automatic-rename-format '#{pane_current_command}'

# Mouse
set -g mouse on

# Terminal colors
set -g default-terminal 'tmux-256color'
set -g terminal-overrides ',xterm-256color:RGB'

# Scrollback buffer
set -g history-limit 10000

# Remove escape delay
set -sg escape-time 0

# Status bar update interval
set -g status-interval 5

# Splits - open in current directory
bind v split-window -h -c '#{pane_current_path}'
bind V split-window -v -c '#{pane_current_path}'
unbind '"'
unbind %

# Pane navigation - vim style
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# TPM plugin install path
set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.tmux/plugins/'

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'catppuccin/tmux#v2.1.3'

# Catppuccin (must be before loading)
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_status_style 'rounded'
set -g @catppuccin_status_fill 'icon'
set -g @catppuccin_status_connect_separator 'no'
set -g @catppuccin_date_time_text '%H:%M'
set -g @catppuccin_window_default_text "#W"
set -g @catppuccin_window_current_text "#W"
set -g @catppuccin_window_text "#W"

# Load catppuccin
run ~/.tmux/plugins/tmux/catppuccin.tmux

# Status bar
set -g status-right-length 100
set -g status-left-length 100
set -g status-left '#{E:@catppuccin_status_session}'
set -g status-right '#{E:@catppuccin_status_directory}#{E:@catppuccin_status_date_time}'

# Session management
bind S command-prompt -p "New session name:" "new-session -s '%%'"
bind C-s display-popup -E "tmux list-sessions | sed 's/:.*$//' | fzf --reverse | xargs tmux switch-client -t"

# Window navigation
bind -n M-h previous-window
bind -n M-l next-window

# Swap windows
bind -r < swap-window -d -t -1
bind -r > swap-window -d -t +1

# Move pane to new window
bind ! break-pane

# Kill session without detaching
bind X confirm-before -p "kill session? (y/n)" "run 'tmux switch-client -n; tmux kill-session -t \"#S\"'"

# Sessionizer
bind C-p display-popup -E "sh $HOME/.local/bin/sessionizer"

# Initialize TPM (must be last line)
run '~/.tmux/plugins/tpm/tpm'
